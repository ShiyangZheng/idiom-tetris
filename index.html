<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Idiom Tetris — V-det-N</title>
<style>
  /* ============================================================
   *  CSS THEME
   *  All colors live in :root as CSS custom properties so the
   *  theme can be tweaked in one place. JS reads them at draw
   *  time via getCss() (no caching, so DevTools edits apply
   *  live).
   *  ============================================================ */
  :root {
    --bg: #1a1d2b;        /* page background */
    --grid-bg: #252a3d;   /* board background + idle cells */
    --grid-line: #2f354a; /* gridline color */
    --verb: #ff7eb3;      /* pink   — verb blocks (slightly desaturated for higher text contrast) */
    --det:  #3fc9c0;      /* teal   — determiner blocks */
    --noun: #ffc94d;      /* gold   — noun blocks */
    --verb-shadow: #c94a85; /* deeper outline for verb cells */
    --det-shadow:  #1f8a83; /* deeper outline for det cells */
    --noun-shadow: #c98a1a; /* deeper outline for noun cells */
    --text: #e6e8ef;      /* default foreground */
    --text-dim: #9aa0b4;  /* secondary text (hints, sub-labels) */
    --accent: #c084fc;    /* highlight color (badges) */
    --clear: #10b981;     /* success color (cleared counter) */
    /* Vertical pixels that the title + subtitle + side HUD consume
     * in each layout mode. fitBoard() subtracts this from the visible
     * viewport height to compute the canvas cell size
     * (availH = visibleH - HEADER_PX; FAB_ROW_PX is 0 in v7 because
     * the FAB is `position: fixed` and doesn't participate in
     * layout). The desktop value (80) is just the title+subtitle
     * chrome; the touch value (204) also accounts for the side HUD
     * chip row that stacks above the board. JS reads this via
     * getComputedStyle(body).getPropertyValue(...). */
    --header-reserved-px: 80px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif;
    height: 100%;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
    min-height: 100vh;
  }
  h1 {
    margin: 0 0 4px 0;
    font-size: 24px;
    letter-spacing: 0.5px;
  }
  .subtitle { color: var(--text-dim); font-size: 13px; margin-bottom: 12px; }
  .layout {
    display: flex;
    gap: 32px;
    align-items: flex-start;
    justify-content: center;
    width: 100%;
  }
  .board-wrap {
    position: relative;
    background: var(--grid-bg);
    border-radius: 8px;
    padding: 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    /* board always fits the viewport — CELL is computed in JS, no scrollbars */
  }
  #board {
    display: block;
    background: var(--grid-bg);
  }
  .side-col {
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 100px;
    flex: 0 0 100px;
    align-items: center;
    padding-top: 8px;
  }
  .mini-stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .mini-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
  }
  .mini-val {
    font-size: 24px;
    font-weight: 700;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
  }
  .legend-row {
    display: flex;
    gap: 4px;
  }
  .legend-row .swatch {
    display: inline-block;
    width: 14px;
    height: 14px;
    border-radius: 3px;
  }
  .controls-mini .kbd-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: 1fr 1fr 1fr;
    gap: 3px;
    justify-items: center;
    align-items: center;
  }
  .controls-mini .kbd-row kbd:nth-child(1) { grid-column: 2; grid-row: 1; } /* ↑   */
  .controls-mini .kbd-row kbd:nth-child(2) { grid-column: 1; grid-row: 2; } /* ←   */
  .controls-mini .kbd-row kbd:nth-child(3) { grid-column: 2; grid-row: 2; } /* ↓   */
  .controls-mini .kbd-row kbd:nth-child(4) { grid-column: 3; grid-row: 2; } /* →   */
  .controls-mini .kbd-row kbd:nth-child(5) { grid-column: 1; grid-row: 3; } /* ␣   */
  .controls-mini .kbd-row kbd:nth-child(6) { grid-column: 3; grid-row: 3; } /* P   */
  .controls-mini kbd {
    background: #1a1d2b;
    padding: 2px 5px;
    border-radius: 3px;
    font-family: monospace;
    font-size: 11px;
    color: var(--text);
    border: 1px solid #2a2e3f;
  }
  .restart-mini {
    background: var(--accent);
    color: #1a1d2b;
    border: none;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    margin-top: 4px;
  }
  .restart-mini:hover { opacity: 0.9; }
  .toggle-mini {
    background: #1a1d2b;
    color: var(--text);
    border: 1px solid #2a2e3f;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    width: 100%;
    margin-top: 4px;
    font-family: inherit;
  }
  .toggle-mini[aria-pressed="true"] {
    background: var(--accent);
    color: #1a1d2b;
    border-color: var(--accent);
  }
  .toggle-mini:hover { opacity: 0.85; }
  .lang-toggle {
    display: flex;
    gap: 4px;
    margin-top: 4px;
  }
  .lang-toggle .toggle-mini {
    flex: 1;
    margin-top: 0;
    text-align: center;
  }
  /* Hidden variant of toast-secondary: when the user has picked
     one meaning language we suppress the other language's slot
     to keep the toast visually compact. */
  .status-mini {
    text-align: center;
    font-size: 11px;
    color: var(--text-dim);
  }
  .panel {
    background: var(--grid-bg);
    border-radius: 8px;
    padding: 10px 12px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .panel h3 {
    margin: 0 0 6px 0;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
  }
  .stat-row { display: flex; justify-content: space-between; padding: 2px 0; font-size: 14px; }
  .stat-val { font-weight: 700; color: var(--accent); }
  .legend { display: flex; flex-direction: column; gap: 6px; font-size: 13px; }
  .swatch {
    display: inline-block; width: 14px; height: 14px;
    border-radius: 3px; margin-right: 6px; vertical-align: middle;
  }
  .controls { font-size: 12px; color: var(--text-dim); line-height: 1.6; }
  .controls kbd {
    background: #1a1d2b; padding: 1px 6px; border-radius: 3px;
    font-family: monospace; color: var(--text);
  }
  button {
    background: var(--accent);
    color: #1a1d2b;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
  }
  button:hover { opacity: 0.9; }
  .gameover { color: #ef4444; font-weight: 700; }
  .particle {
    position: absolute;
    width: 6px; height: 6px;
    border-radius: 50%;
    pointer-events: none;
  }
  #next-canvas {
    display: block;
    margin: 4px auto 2px;
    background: var(--bg);
    border-radius: 6px;
  }
  .next-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 6px;
    font-size: 11px;
    color: var(--text-dim);
  }
  .next-meta .type-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #1a1d2b;
  }
  .next-meta .type-badge.verb { background: var(--verb); }
  .next-meta .type-badge.det  { background: var(--det); }
  .next-meta .type-badge.noun { background: var(--noun); }
  .next-hint {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 4px;
    line-height: 1.4;
  }
  .rule-hint {
    margin-top: 8px;
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.45;
  }
  .status-line {
    margin-top: 6px;
    font-size: 12px;
    color: var(--text-dim);
    text-align: center;
  }

  /* ---------- Game-over modal ---------- */
  .gameover-modal {
    position: fixed;
    inset: 0;
    background: rgba(8, 10, 18, 0.78);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    backdrop-filter: blur(4px);
  }
  .gameover-modal[hidden] { display: none; }
  .gameover-card {
    background: var(--grid-bg);
    border: 1px solid #2a2e3f;
    border-radius: 12px;
    padding: 28px 32px;
    min-width: 320px;
    max-width: 90vw;
    box-shadow: 0 16px 48px rgba(0, 0, 0, 0.6);
    text-align: center;
  }
  .gameover-card h2 {
    margin: 0 0 16px 0;
    color: var(--accent);
    font-size: 22px;
    letter-spacing: 0.5px;
  }
  .final-stats {
    display: flex;
    justify-content: space-around;
    gap: 24px;
    margin-bottom: 20px;
  }
  .final-stats > div {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .final-stats .lbl {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
  }
  .final-stats .val {
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }
  .modal-actions {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .btn-primary, .btn-secondary, .btn-text {
    border: none;
    padding: 10px 16px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    width: 100%;
  }
  .btn-primary { background: var(--accent); color: #1a1d2b; }
  .btn-primary:hover { opacity: 0.9; }
  .btn-secondary {
    background: #1a1d2b;
    color: var(--text);
    border: 1px solid #2a2e3f;
  }
  .btn-secondary:hover { border-color: var(--accent); }
  .btn-text {
    background: transparent;
    color: var(--text-dim);
    font-weight: 400;
  }
  .btn-text:hover { color: var(--text); }
  .share-status {
    margin-top: 8px;
    min-height: 18px;
    font-size: 12px;
    color: var(--text-dim);
  }
  .share-status.ok { color: var(--clear); }
  .share-status.err { color: #ef4444; }

  /* ---------- Name input row (game-over modal) ---------- */
  .name-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 4px 0 16px 0;
  }
  .name-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    flex: 0 0 auto;
  }
  .name-input {
    flex: 1 1 auto;
    background: #1a1d2b;
    border: 1px solid #2a2e3f;
    border-radius: 6px;
    padding: 8px 10px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    outline: none;
  }
  .name-input:focus { border-color: var(--accent); }
  .name-input::placeholder { color: var(--text-dim); font-weight: 400; }

  /* ---------- Leaderboard modal ---------- */
  .leaderboard-card { min-width: 360px; }
  .lb-list {
    list-style: none;
    padding: 0;
    margin: 12px 0 16px 0;
    max-height: 50vh;
    overflow-y: auto;
    text-align: left;
  }
  .lb-list li {
    display: grid;
    grid-template-columns: 56px 1fr auto auto;
    gap: 10px;
    align-items: center;
    padding: 8px 10px;
    border-bottom: 1px solid #2a2e3f;
    font-variant-numeric: tabular-nums;
  }
  .lb-list li:last-child { border-bottom: none; }
  .lb-list .lb-rank {
    font-weight: 700;
    color: var(--text-dim);
    text-align: center;
    white-space: nowrap;
  }
  .lb-list .lb-name {
    font-weight: 600;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .lb-list .lb-score {
    color: var(--accent);
    font-weight: 700;
  }
  .lb-list .lb-cleared {
    color: var(--text-dim);
    font-size: 12px;
  }
  .lb-list .lb-medal { font-size: 16px; }
  /* Top-3 highlight (gold/silver/bronze). */
  .lb-list li:nth-child(1) .lb-rank { color: #fbbf24; }
  .lb-list li:nth-child(2) .lb-rank { color: #d1d5db; }
  .lb-list li:nth-child(3) .lb-rank { color: #d97706; }
  /* The local user's row, when matched, is highlighted. */
  .lb-list li.lb-mine {
    background: rgba(192, 132, 252, 0.10);
    border-radius: 4px;
  }
  .lb-list .lb-empty {
    display: block;
    text-align: center;
    color: var(--text-dim);
    padding: 24px 8px;
    font-size: 13px;
  }

  /* ---------- Idiom-clear (pause) modal ----------
   * Pops up after a v-d-n triple clears. Pauses the game and
   * shows the idiom + both meaning translations so the user can
   * study at their own pace. Duration is controlled by the
   * "Modal" toggle in the right HUD (1s / 2.5s / 5s / Manual).
   * Reuses .gameover-modal backdrop and .gameover-card shell
   * so the two modals feel like siblings. */
  /* Backdrop is pointer-events: none so the user can still reach
   * the EN/中 and "Modal" toggles in the HUD while the modal is
   * up (the live re-render wiring in updateLangToggleUI /
   * updatePauseDurUI swaps the meaning + restarts the countdown
   * the moment the user clicks the HUD). The card itself keeps
   * the default `pointer-events: auto`, so its X / Got-it buttons
   * are still clickable. Backdrop-to-close is intentionally
   * disabled for this modal — use X, Got it, Escape, or P. */
  #clear-modal { pointer-events: none; }
  #clear-modal .gameover-card { pointer-events: auto; }
  .clear-card {
    position: relative;
    min-width: 320px;
    max-width: 380px;
    padding: 32px 28px 22px;
    /* The max-width is intentionally narrower than the game-over
     * modal's card so the centered card never overlaps the right
     * HUD's "Meaning" and "Modal" toggles — that overlap would
     * make those buttons unclickable while the modal is up, which
     * breaks the live-re-render UX (click EN/中 or change
     * duration while the modal is showing). */
  }
  .clear-close {
    position: absolute;
    top: 6px;
    right: 10px;
    background: transparent;
    color: var(--text-dim);
    font-size: 26px;
    font-weight: 400;
    line-height: 1;
    padding: 2px 8px;
    width: auto;
    border-radius: 4px;
  }
  .clear-close:hover { color: var(--text); background: rgba(255,255,255,0.04); }
  .clear-idiom {
    font-size: 30px;
    font-weight: 700;
    color: var(--clear);
    letter-spacing: 0.5px;
    margin-bottom: 14px;
  }
  .clear-meaning {
    line-height: 1.45;
    margin-bottom: 6px;
    word-wrap: break-word;
  }
  .clear-meaning.prim {
    font-size: 17px;
    color: var(--text);
    margin-bottom: 8px;
  }
  .clear-meaning.sec {
    font-size: 13px;
    color: var(--text-dim);
    font-style: italic;
  }
  .clear-progress {
    height: 3px;
    background: rgba(192, 132, 252, 0.18);
    border-radius: 2px;
    overflow: hidden;
    margin: 14px 0 14px;
  }
  .clear-progress-bar {
    height: 100%;
    width: 100%;
    background: var(--accent);
    transform-origin: left center;
  }
  .clear-progress-bar.shrinking {
    animation: clearProgressShrink linear forwards;
  }
  @keyframes clearProgressShrink {
    from { transform: scaleX(1); }
    to   { transform: scaleX(0); }
  }
  /* Click pulse on the "Got it" button so it visually pulses once
   * when the modal opens, drawing the eye to the dismiss action. */
  .clear-continue {
    margin-top: 4px;
    animation: clearContinuePulse 1.8s ease-out 0.3s 1;
  }
  @keyframes clearContinuePulse {
    0%   { box-shadow: 0 0 0 0 rgba(192, 132, 252, 0.55); }
    70%  { box-shadow: 0 0 0 8px rgba(192, 132, 252, 0); }
    100% { box-shadow: 0 0 0 0 rgba(192, 132, 252, 0); }
  }

  /* ============================================================
   *  TOUCH INPUT (mobile / tablets / touch-screen laptops)
   *  1) Disable browser default gestures on the game area so
   *     swipes don't trigger page scroll, zoom, or pull-to-refresh.
   *  2) The floating action buttons (FAB) are hidden by default.
   *     The JS `isMobileTouch()` check reveals them via the
   *     `touch-mode` class on <body>. This way we never show
   *     a useless FAB row on desktops, and the layout is fully
   *     driven by a runtime JS check, not CSS @media queries.
   *  3) On narrow screens with touch-mode, the side HUD columns
   *     collapse so the board can take the full width. The FAB
   *     replaces the right column's controls.
   *  ============================================================ */
  .board-wrap, #board, .touch-fab button {
    /* Hard-block browser default gestures: without these,
     * a horizontal swipe would scroll the page, a pinch would
     * zoom, and a down-swipe from the top would trigger
     * pull-to-refresh on mobile browsers. Note: `touch-action`
     * is NOT inherited, so we have to set it on #board (the
     * canvas that actually receives the touch) in addition to
     * its parent .board-wrap. */
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .touch-fab { display: none; }
  body.touch-mode .touch-fab { display: flex; }

  /* The .board-wrap is the parent flex container of the canvas
   * (and, in touch mode, the .touch-fab — but the FAB is now
   * position:fixed, so it's removed from the flex flow and the
   * board-wrap's height is just the canvas + its own padding).
   * The FAB being fixed means it overlays the bottom of the
   * viewport instead of pushing the board-wrap taller, which is
   * what was causing the FAB to land below the fold on iPhone SE. */
  body.touch-mode .board-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    /* The FAB is now `position: fixed` (see below), so the board-wrap
     * no longer needs to reserve room for it. Keep a small bottom
     * padding for visual breathing room; the iOS safe-area inset is
     * handled by the FAB itself, not by inflating the board-wrap. */
    padding-bottom: 8px;
  }

  .touch-fab {
    /* v7 fix: position the FAB as a fixed overlay at the bottom of
     * the viewport so it's always reachable, even on short phones
     * (iPhone SE etc.) where the body content would otherwise push
     * the FAB below the fold.
     *
     * Why this doesn't break setPointerCapture (the v5 regression):
     * v5 locked the BODY with `position: fixed + height: 100dvh +
     * overflow: hidden`, which changed the root scroller and made
     * setPointerCapture report coords against the wrong scroller.
     * Here we only fix the FAB, not the body — the body remains in
     * normal flow (v6's naturally-scrollable layout) and the canvas
     * keeps capturing pointers normally. The FAB is a transparent
     * overlay with `pointer-events: none` on the wrapper and
     * `pointer-events: auto` only on the button circles, so a
     * horizontal swipe on the canvas (above the FAB row) goes
     * straight to the canvas's pointermove handler regardless of
     * the FAB's positioning. */
    position: fixed;
    left: 0;
    right: 0;
    bottom: max(8px, env(safe-area-inset-bottom, 8px));
    justify-content: center;
    gap: 14px;
    z-index: 50;
    /* The wrapper itself is non-interactive so a stray tap on
     * the gap between buttons falls through to the canvas
     * behind. The buttons themselves re-enable pointer-events. */
    pointer-events: none;
  }
  .touch-fab button {
    pointer-events: auto;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: rgba(0, 0, 0, 0.55);
    color: var(--text);
    font-size: 24px;
    border: 1px solid rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }
  .touch-fab button:active { background: rgba(80, 80, 120, 0.7); }
  .touch-fab .fab-pause { font-size: 22px; }

  /* Tap acknowledgement: a 120ms faint box-shadow pulse around
   * the board-wrap. Tells the player "I heard your touch" without
   * moving the piece or changing the score. */
  .board-wrap.tap-pulse {
    box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.18);
    transition: box-shadow 60ms ease-out;
  }

  /* v9: touch-mode "how to play" help card. Sits inside
   * .board-wrap (flex column, gap:10px from canvas) so it scrolls
   * with the board, but is hidden on desktop so the page stays
   * compact. */
  .touch-how {
    display: none;
    width: 100%;
    box-sizing: border-box;
    max-width: 320px;
    padding: 10px 12px;
    border-radius: 8px;
    background: rgba(20, 24, 40, 0.78);
    border: 1px solid rgba(255, 255, 255, 0.08);
    font-size: 12px;
    line-height: 1.55;
    color: var(--text-dim);
    /* The canvas draws text; the help card is purely informational,
     * so the renderer should never be told to "redraw me". */
    user-select: none;
    -webkit-user-select: none;
  }
  body.touch-mode .touch-how { display: block; }
  .touch-how-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }
  .touch-how-row:last-of-type { margin-bottom: 0; }
  .touch-how-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 26px;
    height: 22px;
    padding: 0 6px;
    border-radius: 4px;
    background: rgba(255, 255, 255, 0.07);
    border: 1px solid rgba(255, 255, 255, 0.10);
    font-size: 13px;
    line-height: 1;
    color: var(--text);

   *       hard drop. A real "I'm scrolling the page" gesture
   *       drifts horizontally and gets eaten by the horizontal
   *       move handler instead.

   *  board + FAB both fit in the visible area. The body itself
   *  is the full document height, so if the user scrolls the
   *  page to see content above/below the canvas, the canvas
   *  size is unchanged (it tracks visualViewport.height, not

     * the top (~80px) → 80 + 124 = 204. The board sizes itself to

<script>
"use strict";

/* ============================================================
 *  Idiom Tetris — V-det-N variant
 *  ------------------------------------------------------------
 *  ARCHITECTURE
 *  ------------------------------------------------------------
 *  This is a single-file HTML+CSS+Canvas game inspired by classic
 *  Tetris but with a psycholinguistics twist: each falling block
 *  is a single English word tagged with its part of speech (verb,
 *  determiner, noun). When the player arranges three blocks in
 *  the canonical V–det–N order so that they form a known English
 *  idiom, those blocks clear with a flourish and the idiom's full
 *  form + Chinese meaning flash on screen as a toast.
 *
 *  The idiom pool (611 entries) is precomputed by a Python build
 *  step and embedded directly into this file as
 *  `window.__IDIOMS_POOL__` so the game runs from `file://` as
 *  well as from a static HTTP server. As a fallback it can also
 *  fetch `idioms_compact.json` next to the HTML.
 *
 *  ------------------------------------------------------------
 *  DATA STRUCTURES
 *  ------------------------------------------------------------
 *  POOL = {
 *    verbs:  [string, ...],                // all verb lemmas
 *    dets:   [string, ...],                // all determiners (the, a, your, ...)
 *    nouns:  [string, ...],                // all noun lemmas
 *    lookup: {                              // key -> {display, cn, en}
 *      "say|the|word"   -> { display:"say the word", cn:"...", en:"..." },
 *      ...
 *    },
 *    _ordered_keys: ["say|the|word", ...]   // for random sampling
 *  }
 *
 *  GRID  -- 20 x 10 board, each cell is one of:
 *      { type: 'empty' }
 *      { type: 'verb' | 'det' | 'noun', word: string, locked: true }
 *
 *  PIECE -- currently-falling block:
 *      { type, word, x, y }                 // x=col, y=row
 *
 *  ------------------------------------------------------------
 *  GAME RULES
 *  ------------------------------------------------------------

 *     With probability P_IDIOM (0.20) the next 3 drops are pulled
 *     from a single curated idiom so the player can plan.
 *  2. When a piece locks, `checkIdiomClear()` looks for any v-d-n
 *     triple in 4 directions (horizontal & vertical), with 0-2
 *     empty gaps allowed between cells, and a whole-board scan
 *     catches anything that gravity just lined up.
 *  3. On a clear: rotate-fade animation -> particles at centroid
 *     -> +score -> apply gravity -> cascade scan.
 *  4. Every 8 clears -> level up -> dropInterval shrinks.
 *  5. Game over if a new piece collides on spawn.
 *
 *  ------------------------------------------------------------
 *  EXTENSION POINTS  (where to hack on the game)
 *  ------------------------------------------------------------
 *  - randomWord()          : tune the difficulty / drop-rate curve
 *  - checkIdiomClear()     : add/relax matching rules (e.g. accept
 *                            ANY gap length, accept diagonal, etc.)
 *  - drawCell()            : visual style of the block
 *  - clearIdiomAt()        : scoring curve + particle effects
 *  - POOL.verbs/dets/nouns : change the lexical inventory
 *  - idioms_compact.json   : source of truth for idiom list;
 *                            regenerating it requires re-running
 *                            the Python prebuild (see README.md)
 *  ============================================================ */
