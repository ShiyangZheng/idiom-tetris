<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Idiom Tetris — itch.io embed</title>
  <link rel="icon" href="icon-192.png">
  <style>
    :root { color-scheme: dark; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: #0e1620;
      color: #e8f0f5;
      font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 32px 16px 48px;
    }
    h1 {
      font-size: 20px;
      margin: 0 0 6px;
      letter-spacing: 0.01em;
    }
    p.lede {
      color: #9aa9b6;
      margin: 0 0 24px;
    }
    .card {
      background: #162330;
      border: 1px solid #3d4751;
      border-radius: 10px;
      padding: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.35);
    }
    .card iframe {
      display: block;
      width: 100%;
      max-width: 552px;
      margin: 0 auto;
    }
    .back {
      display: inline-block;
      margin-top: 18px;
      color: #4fc3f7;
      text-decoration: none;
      font-size: 14px;
    }
    .back:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Idiom Tetris — itch.io</h1>
    <p class="lede">
      This is a static mirror of the itch.io embed card. Click into the
      card to play in your browser, or open it directly on itch.io.
    </p>
    <div class="card">
      <iframe
        frameborder="0"
        src="https://itch.io/embed/4688096?bg_color=162330&amp;fg_color=e8f0f5&amp;link_color=4fc3f7&amp;border_color=3d4751"
        width="552"
        height="167"
        loading="lazy"
        referrerpolicy="no-referrer"
        title="Idiom Tetris on itch.io">
        <a href="https://shiyang-zheng.itch.io/idiom-tetris">Idiom Tetris by Shiyang_Zheng</a>
      </iframe>
    </div>
    <a class="back" href="./">← Back to the playable game</a>
  </main>
</body>
</html>
