# Cloudflare Worker config for the Idiom Tetris leaderboard.
#
# DEPLOYMENT GOTCHA: wrangler 4.x auto-detects static assets in the project
# root and bundles them. Running `wrangler deploy` from inside this repo
# would bundle `../index.html`, `../build_pool.py`, the git objects, etc.
# as static files served by the worker, shadowing the worker code at
# /healthz, /leaderboard, /submit (worker code only runs when no static
# file matches the path).
#
# To deploy cleanly, copy this dir to a stand-alone location first:
#     mkdir -p /tmp/idiom-tetris-leaderboard
#     cp worker/index.js worker/wrangler.toml /tmp/idiom-tetris-leaderboard/
#     cd /tmp/idiom-tetris-leaderboard
#     npx wrangler deploy
# Or use any other directory that has ONLY these two files.
#
# Setup (run once per Cloudflare account):
#   1. npx wrangler login
#   2. npx wrangler kv namespace create LEADERBOARD_SCORES
#   3. npx wrangler kv namespace create LEADERBOARD_RATE
#   4. npx wrangler kv namespace create LEADERBOARD_META
#   5. Paste the three IDs printed above into the [[kv_namespaces]] blocks below.
#   6. npx wrangler deploy
#   7. Copy the printed *.workers.dev URL into WORKER_URL at the top of
#      the second <script> in index.html.
name = "idiom-tetris-leaderboard"
main = "index.js"
compatibility_date = "2024-09-23"

# NO [assets] block — this is a pure API worker. The game UI is served
# separately from shiyangzheng.top/idiom-tetris/. Without [assets], wrangler
# 4.x will NOT auto-detect sibling files as static assets to bundle.

[[kv_namespaces]]
binding = "SCORES"
id = "ebec16d8f2be4eb98fdf2edd401ab397"
preview_id = "ebec16d8f2be4eb98fdf2edd401ab397"

[[kv_namespaces]]
binding = "RATE"
id = "6b47626509b243e7aad741791a4b9891"
preview_id = "6b47626509b243e7aad741791a4b9891"

[[kv_namespaces]]
binding = "META"
id = "87ee835b6a174963a278a13e85bb4444"
preview_id = "87ee835b6a174963a278a13e85bb4444"
