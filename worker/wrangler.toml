# Cloudflare Worker config for the Idiom Tetris leaderboard.
#
# Setup (run once per Cloudflare account / project):
#   1. npm install -g wrangler
#   2. wrangler login
#   3. wrangler kv:namespace create LEADERBOARD_SCORES
#   4. wrangler kv:namespace create LEADERBOARD_RATE
#   5. wrangler kv:namespace create LEADERBOARD_META
#   6. Copy the three IDs printed in step 3-5 into the [[kv_namespaces]] blocks below.
#   7. wrangler deploy
#   8. Note the printed *.workers.dev URL (or attach a custom route) and paste it
#      into WORKER_URL at the top of index.html.
name = "idiom-tetris-leaderboard"
main = "index.js"
compatibility_date = "2024-09-23"

# The three namespaces are bound by name; the binding strings (LEADERBOARD_*
# below) must match what index.js reads as `env.SCORES`, `env.RATE`, `env.META`.
# If you only want one namespace, you can put all three prefixes in one
# namespace and rename the bindings in index.js accordingly.

[[kv_namespaces]]
binding = "SCORES"
id = "REPLACE_ME_KV_SCORES_ID"
preview_id = "REPLACE_ME_KV_SCORES_PREVIEW_ID"

[[kv_namespaces]]
binding = "RATE"
id = "REPLACE_ME_KV_RATE_ID"
preview_id = "REPLACE_ME_KV_RATE_PREVIEW_ID"

[[kv_namespaces]]
binding = "META"
id = "REPLACE_ME_KV_META_ID"
preview_id = "REPLACE_ME_KV_META_PREVIEW_ID"
