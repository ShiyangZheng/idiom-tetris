<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Idiom Tetris — V-det-N</title>
<style>
  /* ============================================================
   *  CSS THEME
   *  All colors live in :root as CSS custom properties so the
   *  theme can be tweaked in one place. JS reads them at draw
   *  time via getCss() (no caching, so DevTools edits apply
   *  live).
   *  ============================================================ */
  :root {
    --bg: #1a1d2b;        /* page background */
    --grid-bg: #252a3d;   /* board background + idle cells */
    --grid-line: #2f354a; /* gridline color */
    --verb: #ff7eb3;      /* pink   — verb blocks (slightly desaturated for higher text contrast) */
    --det:  #3fc9c0;      /* teal   — determiner blocks */
    --noun: #ffc94d;      /* gold   — noun blocks */
    --verb-shadow: #c94a85; /* deeper outline for verb cells */
    --det-shadow:  #1f8a83; /* deeper outline for det cells */
    --noun-shadow: #c98a1a; /* deeper outline for noun cells */
    --text: #e6e8ef;      /* default foreground */
    --text-dim: #9aa0b4;  /* secondary text (hints, sub-labels) */
    --accent: #c084fc;    /* highlight color (badges) */
    --clear: #10b981;     /* success color (cleared counter) */
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif;
    height: 100%;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
    min-height: 100vh;
  }
  h1 {
    margin: 0 0 4px 0;
    font-size: 24px;
    letter-spacing: 0.5px;
  }
  .subtitle { color: var(--text-dim); font-size: 13px; margin-bottom: 12px; }
  .layout {
    display: flex;
    gap: 32px;
    align-items: flex-start;
    justify-content: center;
    width: 100%;
  }
  .board-wrap {
    position: relative;
    background: var(--grid-bg);
    border-radius: 8px;
    padding: 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    /* board always fits the viewport — CELL is computed in JS, no scrollbars */
  }
  #board {
    display: block;
    background: var(--grid-bg);
  }
  .side-col {
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 100px;
    flex: 0 0 100px;
    align-items: center;
    padding-top: 8px;
  }
  .mini-stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .mini-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
  }
  .mini-val {
    font-size: 24px;
    font-weight: 700;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
  }
  .legend-row {
    display: flex;
    gap: 4px;
  }
  .legend-row .swatch {
    display: inline-block;
    width: 14px;
    height: 14px;
    border-radius: 3px;
  }
  .controls-mini .kbd-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: 1fr 1fr 1fr;
    gap: 3px;
    justify-items: center;
    align-items: center;
  }
  .controls-mini .kbd-row kbd:nth-child(1) { grid-column: 2; grid-row: 1; } /* ↑   */
  .controls-mini .kbd-row kbd:nth-child(2) { grid-column: 1; grid-row: 2; } /* ←   */
  .controls-mini .kbd-row kbd:nth-child(3) { grid-column: 2; grid-row: 2; } /* ↓   */
  .controls-mini .kbd-row kbd:nth-child(4) { grid-column: 3; grid-row: 2; } /* →   */
  .controls-mini .kbd-row kbd:nth-child(5) { grid-column: 1; grid-row: 3; } /* ␣   */
  .controls-mini .kbd-row kbd:nth-child(6) { grid-column: 3; grid-row: 3; } /* P   */
  .controls-mini kbd {
    background: #1a1d2b;
    padding: 2px 5px;
    border-radius: 3px;
    font-family: monospace;
    font-size: 11px;
    color: var(--text);
    border: 1px solid #2a2e3f;
  }
  .restart-mini {
    background: var(--accent);
    color: #1a1d2b;
    border: none;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    margin-top: 4px;
  }
  .restart-mini:hover { opacity: 0.9; }
  .toggle-mini {
    background: #1a1d2b;
    color: var(--text);
    border: 1px solid #2a2e3f;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    width: 100%;
    margin-top: 4px;
    font-family: inherit;
  }
  .toggle-mini[aria-pressed="true"] {
    background: var(--accent);
    color: #1a1d2b;
    border-color: var(--accent);
  }
  .toggle-mini:hover { opacity: 0.85; }
  .status-mini {
    text-align: center;
    font-size: 11px;
    color: var(--text-dim);
  }
  .panel {
    background: var(--grid-bg);
    border-radius: 8px;
    padding: 10px 12px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .panel h3 {
    margin: 0 0 6px 0;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
  }
  .stat-row { display: flex; justify-content: space-between; padding: 2px 0; font-size: 14px; }
  .stat-val { font-weight: 700; color: var(--accent); }
  .legend { display: flex; flex-direction: column; gap: 6px; font-size: 13px; }
  .swatch {
    display: inline-block; width: 14px; height: 14px;
    border-radius: 3px; margin-right: 6px; vertical-align: middle;
  }
  .controls { font-size: 12px; color: var(--text-dim); line-height: 1.6; }
  .controls kbd {
    background: #1a1d2b; padding: 1px 6px; border-radius: 3px;
    font-family: monospace; color: var(--text);
  }
  .toast-overlay {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0.6);
    pointer-events: none;
    opacity: 0;
    text-align: center;
    background: rgba(26, 29, 43, 0.94);
    border: 2px solid var(--clear);
    border-radius: 12px;
    padding: 20px 32px;
    box-shadow: 0 0 60px rgba(16, 185, 129, 0.6);
    min-width: 320px;
    max-width: 480px;
  }
  .toast-overlay.show {
    animation: toastPop 1.6s ease-out forwards;
  }
  @keyframes toastPop {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.6); }
    15%  { opacity: 1; transform: translate(-50%, -50%) scale(1.08); }
    25%  { transform: translate(-50%, -50%) scale(1.0); }
    80%  { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(0.9) translateY(-30px); }
  }
  .toast-idiom {
    font-size: 28px;
    font-weight: 700;
    color: var(--clear);
    margin-bottom: 6px;
  }
  .toast-cn {
    font-size: 16px;
    color: #fef3c7;
  }
  .toast-en {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 6px;
    font-style: italic;
  }
  button {
    background: var(--accent);
    color: #1a1d2b;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
  }
  button:hover { opacity: 0.9; }
  .gameover { color: #ef4444; font-weight: 700; }
  .particle {
    position: absolute;
    width: 6px; height: 6px;
    border-radius: 50%;
    pointer-events: none;
  }
  #next-canvas {
    display: block;
    margin: 4px auto 2px;
    background: var(--bg);
    border-radius: 6px;
  }
  .next-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 6px;
    font-size: 11px;
    color: var(--text-dim);
  }
  .next-meta .type-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #1a1d2b;
  }
  .next-meta .type-badge.verb { background: var(--verb); }
  .next-meta .type-badge.det  { background: var(--det); }
  .next-meta .type-badge.noun { background: var(--noun); }
  .next-hint {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 4px;
    line-height: 1.4;
  }
  .rule-hint {
    margin-top: 8px;
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.45;
  }
  .status-line {
    margin-top: 6px;
    font-size: 12px;
    color: var(--text-dim);
    text-align: center;
  }

  /* ---------- Game-over modal ---------- */
  .gameover-modal {
    position: fixed;
    inset: 0;
    background: rgba(8, 10, 18, 0.78);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    backdrop-filter: blur(4px);
  }
  .gameover-modal[hidden] { display: none; }
  .gameover-card {
    background: var(--grid-bg);
    border: 1px solid #2a2e3f;
    border-radius: 12px;
    padding: 28px 32px;
    min-width: 320px;
    max-width: 90vw;
    box-shadow: 0 16px 48px rgba(0, 0, 0, 0.6);
    text-align: center;
  }
  .gameover-card h2 {
    margin: 0 0 16px 0;
    color: var(--accent);
    font-size: 22px;
    letter-spacing: 0.5px;
  }
  .final-stats {
    display: flex;
    justify-content: space-around;
    gap: 24px;
    margin-bottom: 20px;
  }
  .final-stats > div {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .final-stats .lbl {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
  }
  .final-stats .val {
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }
  .modal-actions {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .btn-primary, .btn-secondary, .btn-text {
    border: none;
    padding: 10px 16px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    width: 100%;
  }
  .btn-primary { background: var(--accent); color: #1a1d2b; }
  .btn-primary:hover { opacity: 0.9; }
  .btn-secondary {
    background: #1a1d2b;
    color: var(--text);
    border: 1px solid #2a2e3f;
  }
  .btn-secondary:hover { border-color: var(--accent); }
  .btn-text {
    background: transparent;
    color: var(--text-dim);
    font-weight: 400;
  }
  .btn-text:hover { color: var(--text); }
  .share-status {
    margin-top: 8px;
    min-height: 18px;
    font-size: 12px;
    color: var(--text-dim);
  }
  .share-status.ok { color: var(--clear); }
  .share-status.err { color: #ef4444; }

  /* ---------- Name input row (game-over modal) ---------- */
  .name-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 4px 0 16px 0;
  }
  .name-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    flex: 0 0 auto;
  }
  .name-input {
    flex: 1 1 auto;
    background: #1a1d2b;
    border: 1px solid #2a2e3f;
    border-radius: 6px;
    padding: 8px 10px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    outline: none;
  }
  .name-input:focus { border-color: var(--accent); }
  .name-input::placeholder { color: var(--text-dim); font-weight: 400; }

  /* ---------- Leaderboard modal ---------- */
  .leaderboard-card { min-width: 360px; }
  .lb-list {
    list-style: none;
    padding: 0;
    margin: 12px 0 16px 0;
    max-height: 50vh;
    overflow-y: auto;
    text-align: left;
  }
  .lb-list li {
    display: grid;
    grid-template-columns: 56px 1fr auto auto;
    gap: 10px;
    align-items: center;
    padding: 8px 10px;
    border-bottom: 1px solid #2a2e3f;
    font-variant-numeric: tabular-nums;
  }
  .lb-list li:last-child { border-bottom: none; }
  .lb-list .lb-rank {
    font-weight: 700;
    color: var(--text-dim);
    text-align: center;
    white-space: nowrap;
  }
  .lb-list .lb-name {
    font-weight: 600;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .lb-list .lb-score {
    color: var(--accent);
    font-weight: 700;
  }
  .lb-list .lb-cleared {
    color: var(--text-dim);
    font-size: 12px;
  }
  .lb-list .lb-medal { font-size: 16px; }
  /* Top-3 highlight (gold/silver/bronze). */
  .lb-list li:nth-child(1) .lb-rank { color: #fbbf24; }
  .lb-list li:nth-child(2) .lb-rank { color: #d1d5db; }
  .lb-list li:nth-child(3) .lb-rank { color: #d97706; }
  /* The local user's row, when matched, is highlighted. */
  .lb-list li.lb-mine {
    background: rgba(192, 132, 252, 0.10);
    border-radius: 4px;
  }
  .lb-list .lb-empty {
    display: block;
    text-align: center;
    color: var(--text-dim);
    padding: 24px 8px;
    font-size: 13px;
  }

</style>

  <h1>🧩 Idiom Tetris</h1>
  <div class="subtitle">v-det-n · 3 falling words = 1 idiom cleared</div>

  <div class="layout">
    <aside class="side-col left" aria-label="Game info (left)">
      <div class="mini-stat">
        <div class="mini-label">Next</div>
        <canvas id="next-canvas" width="120" height="56"></canvas>
      </div>
      <div class="mini-stat">
        <div class="mini-label">Cleared</div>
        <div class="mini-val" id="stat-cleared">0</div>

      <div class="mini-stat">
        <div class="mini-label">Score</div>

      </div>
    </aside>

    <div class="board-wrap">
      <canvas id="board" width="300" height="600"></canvas>
      <div class="toast-overlay" id="toast">
        <div class="toast-idiom" id="toast-idiom"></div>
        <div class="toast-cn" id="toast-cn"></div>
        <div class="toast-en" id="toast-en"></div>
      </div>
    </div>

    <aside class="side-col right" aria-label="Game info (right)">
      <div class="mini-stat legend-mini">
        <div class="mini-label">Types</div>
        <div class="legend-row">
          <span class="swatch" style="background:var(--verb)"></span>
          <span class="swatch" style="background:var(--det)"></span>
          <span class="swatch" style="background:var(--noun)"></span>
        </div>
      </div>
      <div class="mini-stat controls-mini">
        <div class="mini-label">Controls</div>
        <div class="kbd-row">
          <kbd>↑</kbd>
          <kbd>←</kbd><kbd>↓</kbd><kbd>→</kbd>

          <kbd>P</kbd>

  </div>

  <!-- ============================================================
       Game-over modal (hidden until gameOver flips). Shows final
       stats, lets the player enter a name and submit to the
       global leaderboard, and offers Share to social + Skip.
       Renders above the board via z-index 1000.
       ============================================================ -->
  <div id="gameover-modal" class="gameover-modal" hidden>
    <div class="gameover-card">
      <h2>Game over</h2>
      <div class="final-stats">
        <div><span class="lbl">Score</span><span class="val" id="final-score">0</span></div>
        <div><span class="lbl">Cleared</span><span class="val" id="final-cleared">0</span></div>

      <div class="modal-actions">

        <button id="btn-share" class="btn-secondary">Share</button>
        <button id="btn-skip" class="btn-text">Skip</button>

      <div id="share-status" class="share-status"></div>
    </div>
  </div>

       ============================================================ -->

      <h2>🏆 Leaderboard</h2>

      <ol id="lb-list" class="lb-list"></ol>
      <div class="modal-actions">
        <button id="btn-lb-close" class="btn-secondary">Close</button>
      </div>
    </div>

<script>
"use strict";

/* ============================================================
 *  Idiom Tetris — V-det-N variant
 *  ------------------------------------------------------------
 *  ARCHITECTURE
 *  ------------------------------------------------------------
 *  This is a single-file HTML+CSS+Canvas game inspired by classic
 *  Tetris but with a psycholinguistics twist: each falling block
 *  is a single English word tagged with its part of speech (verb,
 *  determiner, noun). When the player arranges three blocks in
 *  the canonical V–det–N order so that they form a known English
 *  idiom, those blocks clear with a flourish and the idiom's full
 *  form + Chinese meaning flash on screen as a toast.
 *
 *  The idiom pool (611 entries) is precomputed by a Python build
 *  step and embedded directly into this file as
 *  `window.__IDIOMS_POOL__` so the game runs from `file://` as
 *  well as from a static HTTP server. As a fallback it can also
 *  fetch `idioms_compact.json` next to the HTML.
 *
 *  ------------------------------------------------------------
 *  DATA STRUCTURES
 *  ------------------------------------------------------------
 *  POOL = {
 *    verbs:  [string, ...],                // all verb lemmas
 *    dets:   [string, ...],                // all determiners (the, a, your, ...)
 *    nouns:  [string, ...],                // all noun lemmas
 *    lookup: {                              // key -> {display, cn, en}
 *      "say|the|word"   -> { display:"say the word", cn:"...", en:"..." },
 *      ...
 *    },
 *    _ordered_keys: ["say|the|word", ...]   // for random sampling
 *  }
 *
 *  GRID  -- 20 x 10 board, each cell is one of:
 *      { type: 'empty' }
 *      { type: 'verb' | 'det' | 'noun', word: string, locked: true }
 *
 *  PIECE -- currently-falling block:
 *      { type, word, x, y }                 // x=col, y=row
 *
 *  ------------------------------------------------------------
 *  GAME RULES
 *  ------------------------------------------------------------
 *  1. Random words fall (50% verb / 15% det / 35% noun by default).
 *     With probability P_IDIOM (0.20) the next 3 drops are pulled
 *     from a single curated idiom so the player can plan.
 *  2. When a piece locks, `checkIdiomClear()` looks for any v-d-n
 *     triple in 4 directions (horizontal & vertical), with 0-2
 *     empty gaps allowed between cells, and a whole-board scan
 *     catches anything that gravity just lined up.
 *  3. On a clear: rotate-fade animation -> particles at centroid
 *     -> +score -> apply gravity -> cascade scan.
 *  4. Every 8 clears -> level up -> dropInterval shrinks.
 *  5. Game over if a new piece collides on spawn.
 *
 *  ------------------------------------------------------------
 *  EXTENSION POINTS  (where to hack on the game)
 *  ------------------------------------------------------------
 *  - randomWord()          : tune the difficulty / drop-rate curve
 *  - checkIdiomClear()     : add/relax matching rules (e.g. accept
 *                            ANY gap length, accept diagonal, etc.)
 *  - drawCell()            : visual style of the block
 *  - clearIdiomAt()        : scoring curve + particle effects
 *  - POOL.verbs/dets/nouns : change the lexical inventory
 *  - idioms_compact.json   : source of truth for idiom list;
 *                            regenerating it requires re-running
 *                            the Python prebuild (see README.md)
 *  ============================================================ */

const COLS = 13;
const ROWS = 22;
let CELL = 50;          // dynamic; recomputed by fitBoard() so the whole 22x7 grid fits the viewport
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');

/* Next-piece preview refs — declared before fitBoard() because
 * fitBoard() is invoked at script-eval time and will call drawNext()
 * to redraw the preview on resize. drawNext() reads these in its
 * lazy-init block, so they must be hoisted (let bindings). The DOM
 * lookup itself stays lazy (first call) since #next-canvas is in
 * the <body> below this script. */
let nextCanvas, nextCtx, nextTypeBadge;

/* Boot flag — flipped to true at the end of loadPool().then(...).
 * drawNext() checks this so the early fitBoard() resize path
 * (which runs at script-eval time, before the `let next` binding
 * further down has been initialized) doesn't TDZ-crash. We use
 * a `var` because it sidesteps the temporal dead zone entirely
 * for primitive reads. */
var bootComplete = false;

/**
 * Compute the largest cell size that keeps the entire board visible
 * inside the current viewport, then resize the canvas accordingly.
 * Height is the binding constraint (22 rows × CELL must fit in
 * innerHeight minus the title/subtitle/padding). Width is also capped
 * to keep the side panels comfortably visible.
 *
 * Re-invoked on window resize so the layout stays correct when the
 * user resizes the browser or rotates the device.
 */
function fitBoard() {
  /* Reserve ~80px for the title, subtitle and body padding, then
     give the side panels (100px each) the rest of the horizontal
     budget. The board takes whatever's left. With 10 cols × 22 rows
     the board is naturally a portrait 5:11. We use a 5:11 aspect
     hint so cells stay square (wider cells let long words like
     "clanger" or "embarrassment" fit comfortably). */
  const HEADER_PX  = 80;
  const SIDE_PX    = 100 + 100 + 96;     // 2 side-cols + gaps
  const availH = window.innerHeight - HEADER_PX;
  const availW = window.innerWidth  - SIDE_PX - 32;   // -32 for body padding
  /* Pick the cell size that fits the viewport with both constraints.
     Width-driven limit on narrow windows, height-driven on short ones. */
  const cellByH = Math.floor(availH / ROWS);
  const cellByW = Math.floor(availW / COLS);
  /* Clamp to [28, 44]. On a 1440x900 window: cellByH = 37, cellByW
     (13 cols) = ~84 → height wins → 37px cells → board 481x814.
     On a 1080p window: 1000/22 ≈ 45, cap to 44 → board 572x968. */
  CELL = Math.max(28, Math.min(44, cellByH, cellByW));
  canvas.width  = COLS * CELL;
  canvas.height = ROWS * CELL;
  /* If the next-piece preview canvas already exists, redraw it so
     the cell size change propagates. */
  if (typeof drawNext === 'function') drawNext();
}
fitBoard();
window.addEventListener('resize', fitBoard);

/* ---------- Next-piece preview ----------
 * Renders the next block on a small side canvas so the player can
 * plan ahead. The next canvas is sized 180x60 (px) in HTML; we
 * fit a single cell into it with a 6px margin.
 * ------------------------------------- */
/* nextCanvas / nextCtx / nextTypeBadge are declared near the top
 * of this script (above fitBoard) so they're already initialized
 * when fitBoard() first runs and calls drawNext() to repaint the
 * side panel on resize. The DOM lookup stays lazy since #next-canvas
 * is in the <body> after this script. */
// (declarations hoisted)

/**
 * Repaints the next-piece side panel.
 * Must be called every time `next` changes (i.e. inside spawnNext).
 * Also updates the small color-coded type badge ("verb" / "det" / "noun").
 */
function drawNext() {
  /* Lazy init: fetch DOM refs on first call. Safe because by the
     time drawNext is reached, the <body> has been parsed. */
  if (!nextCanvas) {
    nextCanvas = document.getElementById('next-canvas');
    nextCtx    = nextCanvas.getContext('2d');
    nextTypeBadge = document.getElementById('next-type');
  }
  /* Clear preview */
  nextCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
  /* Pre-boot guard: `next` is a `let` binding declared further down.
   * Until the boot promise resolves (loadPool() → restart()), the
   * binding lives in the TDZ — and `typeof` on a TDZ `let` actually
   * throws in strict mode. So just no-op before boot completes. */
  if (!bootComplete || !next) {
    if (nextTypeBadge) {
      nextTypeBadge.textContent = '—';
      nextTypeBadge.className = 'type-badge';
    }
    return;
  }
  /* Render the upcoming block in the center of the small canvas */
  const margin = 6;
  const cellSize = Math.min(
    nextCanvas.width - 2 * margin,
    nextCanvas.height - 2 * margin
  );
  const x = (nextCanvas.width - cellSize) / 2;
  const y = (nextCanvas.height - cellSize) / 2;
  /* Reuse the same drawCell logic so colors / fonts match the main board */
  drawCellOnCtx(nextCtx, next.type, next.word, x, y, cellSize, 1, false);
  /* Update the type badge (only if the badge element still exists —
   * the redesigned mini side panel intentionally drops the badge to
   * save horizontal space). */
  if (nextTypeBadge) {
    nextTypeBadge.textContent = next.type;
    nextTypeBadge.className = `type-badge ${next.type}`;
  }
}

/**
 * Variant of `drawCell()` that takes an explicit Canvas context.
 * Lets us reuse the exact same visual style for the next-piece
 * preview canvas as for the main board.
 *
 * @param {CanvasRenderingContext2D} c  - target context
 * @param {string} type                 - 'verb' | 'det' | 'noun' | 'empty'
 * @param {string} word                 - the word to draw inside the cell
 * @param {number} x,y                  - top-left pixel coords on `c`
 * @param {number} size                 - cell side length in px
 * @param {number} [alpha=1]            - global alpha multiplier
 * @param {boolean} [ghost=false]       - if true, render dashed outline only
 */
function drawCellOnCtx(c, type, word, x, y, size, alpha=1, ghost=false) {
  /* Mirror of drawCell() but parameterized on the canvas context so we
     can render the next-piece preview on the side canvas. */
  if (type === 'empty') return;
  const colors = {
    verb: getCss('--verb'),
    det:  getCss('--det'),
    noun: getCss('--noun'),
  };
  const shadows = {
    verb: getCss('--verb-shadow'),
    det:  getCss('--det-shadow'),
    noun: getCss('--noun-shadow'),
  };
  c.save();
  c.globalAlpha = alpha;
  if (ghost) {
    c.strokeStyle = colors[type];
    c.lineWidth = 2;
    c.setLineDash([5, 4]);
    c.fillStyle = 'transparent';
  } else {
    c.fillStyle = colors[type];
    c.strokeStyle = shadows[type];
    c.lineWidth = 2;
    c.setLineDash([]);
  }
  const r = 5;
  const xx = x + 1, yy = y + 1, ss = size - 2;
  c.beginPath();
  c.moveTo(xx + r, yy);
  c.arcTo(xx + ss, yy,     xx + ss, yy + ss, r);
  c.arcTo(xx + ss, yy + ss, xx,      yy + ss, r);
  c.arcTo(xx,      yy + ss, xx,      yy,      r);
  c.arcTo(xx,      yy,      xx + ss, yy,      r);
  c.closePath();
  if (!ghost) c.fill();
  c.stroke();
  c.setLineDash([]);
  if (ghost) { c.restore(); return; }
  c.fillStyle = '#1a1d2b';
  c.textAlign = 'center';
  c.textBaseline = 'middle';
  const targetWidth = ss - 5;
  let fontSize = Math.floor(ss * 0.70);
  const fontStack = '-apple-system, "Helvetica Neue", "Segoe UI", system-ui, sans-serif';
  c.font = `800 ${fontSize}px ${fontStack}`;
  while (c.measureText(word).width > targetWidth && fontSize > 8) {
    fontSize -= 1;
    c.font = `800 ${fontSize}px ${fontStack}`;
  }
  while ((fontSize + 3) > ss && fontSize > 8) {
    fontSize -= 1;
    c.font = `800 ${fontSize}px ${fontStack}`;
  }
  const cxc = x + size/2;
  const cyc = y + size/2;
  /* Three-pass render for crisp, readable text on any cell color:
   *   1. Heavy dark outline — strong dark edge
   *   2. Bright white halo — chromatic break that sharpens glyphs
   *   3. Solid dark fill — final word color
   * Same trick drawCell() uses, but for the side-panel preview canvas. */
  c.lineJoin = 'round';
  c.miterLimit = 2;
  /* Layer 1: bright halo (1px) — sharpens glyphs against any cell color */
  c.strokeStyle = 'rgba(255, 255, 255, 0.55)';
  c.lineWidth = Math.max(0.8, fontSize * 0.06);
  c.strokeText(word, cxc, cyc);
  /* Layer 2: heavy dark outline — gives the white text a strong dark
   * edge so it pops on the bright cell colors */
  c.strokeStyle = 'rgba(8, 10, 18, 0.92)';
  c.lineWidth = Math.max(2, fontSize * 0.18);
  c.strokeText(word, cxc, cyc);
  /* Layer 3: solid white fill — the final word color */
  c.fillStyle = '#f8fafc';
  c.fillText(word, cxc, cyc);
  c.restore();
}

/* ---------- Load idioms (populated by Python prebuild) ----------
 * The idiom pool is built offline by a Python script and is then
 * either (a) embedded inline into this file as `window.__IDIOMS_POOL__`
 * (the default — set by the prebuild), or (b) served next to the
 * HTML as `idioms_compact.json` (lazy fetch fallback).
 * If both fail we drop back to a 10-verb hardcoded pool so the
 * game still runs for development.
 * ------------------------------------------------------------ */
let POOL = { verbs: [], dets: [], nouns: [], lookup: {} };

/**
 * Loads the idiom pool into the global `POOL` variable.
 * Returns a Promise; the game must wait on this before spawning
 * pieces (otherwise randomWord() will pick from an empty pool).
 */
async function loadPool() {
  /* Try embedded first (works on file:// too) */
  if (window.__IDIOMS_POOL__) {
    POOL = window.__IDIOMS_POOL__;
    document.querySelector('.subtitle').textContent =
      `v-det-n · ${Object.keys(POOL.lookup).length} idioms loaded (embedded)`;
    return;
  }
  try {
    const res = await fetch('idioms_compact.json');
    if (res.ok) {
      POOL = await res.json();
      document.querySelector('.subtitle').textContent =
        `v-det-n · ${Object.keys(POOL.lookup).length} idioms loaded`;
      return;
    }
    throw new Error('no fetch');
  } catch (e) {
    console.warn('using fallback pool:', e);
    POOL = {
      verbs: ['bite','kick','hit','spill','break','take','make','run','turn','jump'],
      dets: ['the','your','a','my','an','this'],
      nouns: ['bullet','bucket','books','milk','heart','photo','mile','tables','shark','horse'],
      lookup: {
        'bite|the|bullet': {display:'bite the bullet', cn:'硬着头皮', en:'Endure something difficult.'},
        'kick|the|bucket': {display:'kick the bucket', cn:'翘辫子', en:'Die (humorous).'},
        'hit|the|books':   {display:'hit the books',   cn:'用功读书', en:'Study hard.'},
        'spill|the|beans': {display:'spill the beans', cn:'泄密', en:'Reveal a secret.'},
        'break|the|heart': {display:'break the heart', cn:'令人心碎', en:'Cause deep sadness.'},
        'take|a|photo':    {display:'take a photo',    cn:'拍张照片', en:'Take a photograph.'},
        'run|the|mile':    {display:'run the mile',    cn:'跑完一英里', en:'Run a mile.'},
        'turn|the|tables': {display:'turn the tables', cn:'扭转局面', en:'Reverse the situation.'},
        'jump|the|shark':  {display:'jump the shark',  cn:'走下坡路', en:'Begin to decline in quality.'},
      }
    };
    document.querySelector('.subtitle').textContent =
      'v-det-n · demo pool (offline)';
  }
}

/* ---------- Game state ----------
 * All mutable state lives at module scope for easy inspection in
 * DevTools. The only true singleton is the `grid` 2D array.
 * -------------------------------- */
let grid;              // 2D array: {type:'verb'|'det'|'noun'|'empty', word:'', locked:false}
let current;           // {type, word, x, y} -- the actively-falling piece
let next;              // upcoming piece (rendered in side panel)
let cleared = 0;       // number of idioms successfully cleared
let score = 0;         // points (100 * level per idiom; +1 per soft-drop cell)
let lines = 0;         // (currently unused; reserved for row-clear tracking)
let level = 1;         // increases every 8 clears; speeds up the drop
let dropTimer = 0;     // ms accumulated since last automatic drop
let lastTime = 0;      // last requestAnimationFrame timestamp
let gameOver = false;
let paused = false;
let dropInterval = 800; // ms per cell; decreases as `level` rises

/** Tiny alias for document.getElementById. */
const $ = id => document.getElementById(id);

/** Build a fresh empty 20x10 grid. */
function makeGrid() {
  return Array.from({length: ROWS}, () => Array.from({length: COLS}, () => ({type: 'empty', word: ''})));
}

/**
 * Returns a random word tagged with its part of speech.
 *
 * "Smart drop" behavior: with probability `window.__DIFFICULTY__`
 * (default 0.20) we consume 3 words from a single curated idiom in
 * V -> det -> N order. Otherwise we fall back to type-weighted
 * uniform random (50% verb / 15% det / 35% noun — verbs and nouns
 * outnumber determiners by ~3:1 in the pool, so this roughly
 * mirrors the pool's natural distribution).
 *
 * @returns {{type:'verb'|'det'|'noun', word:string}}
 */
function randomWord() {
  /* Smart drop: with probability P_IDIOM, return next word from a curated idiom
     (so 3 consecutive drops form a valid idiom if lined up correctly).
     Otherwise fall back to uniform random. */
  if (Math.random() < (window.__DIFFICULTY__ || 0.20) && _idiomQueue.length === 0) {
    /* start a new 3-word idiom queue */
    const key = POOL._ordered_keys[Math.floor(Math.random() * POOL._ordered_keys.length)];
    const [v, d, n] = key.split('|');
    _idiomQueue.push({type: 'verb', word: v});
    _idiomQueue.push({type: 'det',  word: d});
    _idiomQueue.push({type: 'noun', word: n});
  }
  if (_idiomQueue.length > 0) {
    return _idiomQueue.shift();
  }
  /* fall back: uniform random */
  const r = Math.random();
  let type, pool;
  if (r < 0.5) { type = 'verb'; pool = POOL.verbs; }
  else if (r < 0.65) { type = 'det'; pool = POOL.dets; }
  else { type = 'noun'; pool = POOL.nouns; }
  return { type, word: pool[Math.floor(Math.random() * pool.length)] };
}

/** FIFO queue of upcoming "smart-drop" words. */
const _idiomQueue = [];

/** Build a new piece at the top-center of the grid (x=3, y=0). */
function newPiece() {
  return { ...randomWord(), x: 3, y: 0 };
}

/**
 * Promote `next` -> `current`, generate a new `next`, repaint
 * the side preview, and check whether the new piece is already
 * colliding (in which case it's game over).
 *
 * Each new piece gets a uniformly random x in [0, COLS-1] instead
 * of always spawning at x=3 (top-center). This makes the game much
 * more chaotic because the player can't choose where the next block
 * lands — they have to react to it. The column is re-rolled up to
 * 6 times if it would overlap the top row (avoids instant
 * game-over from unlucky spawns).
 */
function spawnNext() {
  current = next || newPiece();
  next = newPiece();
  for (let attempt = 0; attempt < 6; attempt++) {
    const candidate = Math.floor(Math.random() * COLS);
    const probe = { ...next, x: candidate, y: 0 };
    if (!collides(probe, 0, 0)) { next.x = candidate; break; }
  }
  drawNext();
  if (collides(current, 0, 0)) {
    gameOver = true;
  }
}

/**
 * Would the piece overlap anything / leave the board if we moved
 * it by (dx, dy) cells? Used for movement, soft/hard drop, and
 * the ghost preview calculation.
 *
 * @param {{x:number, y:number, type:string}} piece
 * @param {number} dx
 * @param {number} dy
 * @returns {boolean} true if the move is blocked
 */
function collides(piece, dx, dy) {
  const nx = piece.x + dx;
  const ny = piece.y + dy;
  if (nx < 0 || nx >= COLS || ny >= ROWS) return true;
  if (ny < 0) return false; // above grid (still spawning)
  const cell = grid[ny][nx];
  return cell.type !== 'empty';
}

/**
 * Write the active piece into the grid and try to clear any
 * idiom it just formed. Called from the game loop on collision
 * or on hard-drop.
 *
 * @param {{x:number, y:number, type:string, word:string}} piece
 */
function lock(piece) {
  if (piece.y < 0) {
    gameOver = true;
    return;
  }
  grid[piece.y][piece.x] = { type: piece.type, word: piece.word, locked: true };
  /* New rule: as long as the 3 words of a valid idiom are neighbors
     (no foreign word in between), they can clear — even if other words
     are above/below or further out on the same row. */
  checkIdiomClear(piece.x, piece.y);
  dropTimer = 0;
  spawnNext();
}

/* ---------- Idiom detection ----------
 * The rules live in checkIdiomClear() and its helpers. They walk
 * the grid in priority order, returning as soon as the first
 * match is found (we clear one idiom at a time to keep the
 * animation readable; cascades happen via the recursive call
 * inside clearIdiomAt()).
 * ----------------------------------- */

/**
 * Try to find and clear an idiom involving the just-locked cell
 * at (px, py). Clears at most one idiom per call; cascade
 * detection happens later via scanAllForIdioms() after gravity.
 *
 * Detection is in 4 priority phases:
 *   (A)   Direct neighbors: 3 adjacent cells in a straight line
 *         in one of 4 directions, types matching v-d-n or n-d-v.
 *   (A')  Same line with 0-2 empty gaps between cells.
 *   (B)   Row scan on the locked cell's own row.
 *   (B')  Whole-board scan (catches anything that lined up from
 *         a previous cascade).
 *
 * @param {number} px  - column of the cell that just locked
 * @param {number} py  - row    of the cell that just locked
 */
function checkIdiomClear(px, py) {
  /* Find ALL valid v-d-n idioms that touch the just-locked cell (px,py).
     Two formation patterns are allowed:
       (A) DIRECT NEIGHBOR: the 3 cells are in a straight line, every
           cell in between is empty (the just-locked cell may sit in the
           middle or at either end).  1-2 cell gaps allowed.
       (B) ROW SCAN: any 3 consecutive cells in this row forming v-d-n.
     For each valid cluster, the 3 cells are cleared and the idiom is
     surfaced in a toast. Up to 2 clusters cleared per lock. */

  const found = new Set();
  const tryEmit = (cells, key) => {
    const sig = cells.map(([x,y]) => `${x},${y}`).sort().join('|');
    if (found.has(sig)) return false;
    found.add(sig);
    const cx = cells.reduce((a,c)=>a+c[0],0) / cells.length;
    const cy = cells.reduce((a,c)=>a+c[1],0) / cells.length;
    clearIdiomAt(cx, cy, cells, key);
    return true;
  };

  const cellAt = (cx, cy) => {
    if (cx < 0 || cx >= COLS || cy < 0 || cy >= ROWS) return null;
    return grid[cy][cx];
  };
  const isEmpty = (cx, cy) => {
    const c = cellAt(cx, cy);
    return c && c.type === 'empty';
  };

  /* (A) DIRECT NEIGHBOR: scan 4 directions for v-d-n with 0, 1, or 2 empty gaps.
     The 3 cells must be in a straight line (horizontal or vertical).
     The just-locked cell (px,py) is one of the 3 (not necessarily the verb). */
  const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
  for (const [dx, dy] of dirs) {
    for (const layout of [
      /* v d n  */  ['verb', 'det', 'noun'],
      /* n d v  */  ['noun', 'det', 'verb'],  // reverse direction
    ]) {
      /* offsets from (px,py) for each role */
      const offs = [
        [0, 0],
        [dx, dy],
        [2*dx, 2*dy],
      ];
      const cells = offs.map(([ox, oy]) => [px + ox, py + oy]);
      const inBounds = cells.every(([x,y]) => x >= 0 && x < COLS && y >= 0 && y < ROWS);
      if (!inBounds) continue;
      const types = layout;
      const cellVals = cells.map(([x,y]) => grid[y][x]);
      const typeMatch = cellVals.every((c, i) => c.type === types[i] && c.word);
      if (!typeMatch) continue;
      /* No "foreign" word in between — since cells are adjacent, the between
         cells ARE the cells themselves, so no check needed for offset 0/1/2. */
      const v = layout[0] === 'verb' ? cellVals[0] : cellVals[2];
      const d = cellVals[1];
      const n = layout[0] === 'verb' ? cellVals[2] : cellVals[0];
      const key = `${v.word}|${d.word}|${n.word}`;
      if (POOL.lookup[key]) {
        if (tryEmit(cells, key)) return;
      }
    }
  }

  /* (A-extension) STRAIGHT LINE WITH 1-2 EMPTY GAPS, starting from (px,py).
     Search 4 directions for the closest v (or n), then a d in between, then n (or v). */
  for (const [dx, dy] of dirs) {
    for (const targetEnd of ['verb', 'noun']) {
      /* The locked cell is the MIDDLE or one of the ends. Try "locked" as middle: */
      if (targetEnd === 'noun') {
        /* find first v in direction (dx,dy), with det in between */
        let blocked = false;
        for (let step = 1; step <= 4; step++) {
          const farCell = cellAt(px + step*dx, py + step*dy);
          if (!farCell) { blocked = true; break; }
          if (farCell.type !== 'verb') continue;
          if (step < 2) continue;
          const detCell = cellAt(px + dx, py + dy);
          if (!detCell || detCell.type !== 'det') continue;
          for (let k = 2; k < step; k++) {
            if (!isEmpty(px + k*dx, py + k*dy)) { blocked = true; break; }
          }
          if (blocked) continue;
          const key = `${farCell.word}|${detCell.word}|${cellAt(px,py).word}`;
          if (POOL.lookup[key] && cellAt(px,py).type === 'noun') {
            const cells = [[px+step*dx,py+step*dy],[px+dx,py+dy],[px,py]];
            if (tryEmit(cells, key)) return;
          }
        }
      } else {
        /* find first n in direction (dx,dy), with det in between, locked cell = verb */
        let blocked = false;
        for (let step = 1; step <= 4; step++) {
          const farCell = cellAt(px + step*dx, py + step*dy);
          if (!farCell) { blocked = true; break; }
          if (farCell.type !== 'noun') continue;
          if (step < 2) continue;
          const detCell = cellAt(px + dx, py + dy);
          if (!detCell || detCell.type !== 'det') continue;
          for (let k = 2; k < step; k++) {
            if (!isEmpty(px + k*dx, py + k*dy)) { blocked = true; break; }
          }
          if (blocked) continue;
          const key = `${cellAt(px,py).word}|${detCell.word}|${farCell.word}`;
          if (POOL.lookup[key] && cellAt(px,py).type === 'verb') {
            const cells = [[px,py],[px+dx,py+dy],[px+step*dx,py+step*dy]];
            if (tryEmit(cells, key)) return;
          }
        }
      }
    }
  }

  /* (B) ROW SCAN: any 3 consecutive cells in this row forming v-d-n. */
  for (let start = 0; start + 2 < COLS; start++) {
    const a = grid[py][start], b = grid[py][start+1], c = grid[py][start+2];
    if (!a.word || !b.word || !c.word) continue;
    if (a.type !== 'verb' || b.type !== 'det' || c.type !== 'noun') continue;
    const key = `${a.word}|${b.word}|${c.word}`;
    if (POOL.lookup[key]) {
      const positions = [[start,py],[start+1,py],[start+2,py]];
      if (tryEmit(positions, key)) return;
    }
  }

  /* (B-extension) WHOLE-BOARD SCAN if no immediate clear.
     Find ANY v-d-n triple on the same row, anywhere, regardless of distance
     to (px,py). Skip if any of the 3 cells is currently being animated. */
  for (let row = 0; row < ROWS; row++) {
    for (let start = 0; start + 2 < COLS; start++) {
      const a = grid[row][start], b = grid[row][start+1], c = grid[row][start+2];
      if (!a.word || !b.word || !c.word) continue;
      if (a.type !== 'verb' || b.type !== 'det' || c.type !== 'noun') continue;
      const key = `${a.word}|${b.word}|${c.word}`;
      if (POOL.lookup[key]) {
        const positions = [[start,row],[start+1,row],[start+2,row]];
        if (tryEmit(positions, key)) return;
      }
    }
  }
}

/**
 * Animate the idiom out (rotate + fade) and then commit the clear.
 * The animation lives in its own requestAnimationFrame loop so the
 * main game loop can keep ticking.
 *
 * @param {number} cx            - centroid x (for particle spawn)
 * @param {number} cy            - centroid y (for particle spawn)
 * @param {Array<[number,number]>} positions - the 3 [x,y] cells to clear
 * @param {string} key           - lookup key "verb|det|noun"
 */
function clearIdiomAt(cx, cy, positions, key) {
  /* positions: array of 3 [x,y] coordinates of the cells forming the idiom. */
  const entry = POOL.lookup[key];
  showToast(entry);

  let ticks = 0;
  const animate = () => {
    ticks++;
    draw();
    ctx.save();
    ctx.globalAlpha = 1 - ticks / 14;
    for (const [px, py] of positions) {
      const c = grid[py][px];
      if (!c.word) continue;
      const x = px * CELL;
      const y = py * CELL;
      ctx.translate(x + CELL/2, y + CELL/2);
      ctx.rotate(ticks * 0.18);
      ctx.translate(-(x + CELL/2), -(y + CELL/2));
      drawCell(c.type, c.word, x, y, CELL, 1);
    }
    ctx.restore();
    if (ticks < 14) {
      requestAnimationFrame(animate);
    } else {
      /* Actually clear */
      for (const [px, py] of positions) {
        grid[py][px] = {type: 'empty', word: ''};
      }
      /* Particles at centroid */
      const partX = Math.round(cx);
      const partY = Math.round(cy);
      spawnParticles(partX, partY, 30);
      cleared += 1;
      score += 100 * level;
      $('stat-cleared').textContent = cleared;
      $('stat-score').textContent = score;
      applyGravity();
      /* After clearing & gravity, the new arrangement may have produced
         more valid idioms (cascade). Re-scan the row. */
      if (cleared % 8 === 0) {
        level += 1;
        dropInterval = Math.max(150, 800 - (level - 1) * 70);
        /* level is no longer shown in the UI (intentional), but the
         * internal counter still drives the difficulty curve. */
      }
      draw();
      /* Chain: scan the locked cell's column too */
      const lastLocked = positions[positions.length - 1];
      if (lastLocked) {
        checkIdiomClear(lastLocked[0], lastLocked[1]);
      }
    }
  };
  animate();
}

/**
 * Make every column "fall" by collapsing any empty cells below
 * a non-empty one. Then trigger a whole-board idiom scan to
 * catch cascades (gravity may have lined up new v-d-n triples).
 */
function applyGravity() {
  for (let c = 0; c < COLS; c++) {
    for (let r = ROWS - 1; r >= 0; r--) {
      if (grid[r][c].type !== 'empty') {
        let nr = r;
        while (nr + 1 < ROWS && grid[nr + 1][c].type === 'empty') {
          nr += 1;
        }
        if (nr !== r) {
          grid[nr][c] = grid[r][c];
          grid[r][c] = {type: 'empty', word: ''};
        }
      }
    }
  }
  /* After gravity, scan whole board for any new v-d-n idioms that have
     become aligned because cells dropped. */
  scanAllForIdioms();
}

/**
 * Brute-force scan: for every row, check every 3-consecutive-cell
 * window. If it forms a valid v-d-n, clear the leftmost match and
 * return (cascades are caught by clearIdiomAt's gravity+rescan).
 */
function scanAllForIdioms() {
  /* Scan every row for any 3 consecutive cells forming v-d-n. */
  for (let r = 0; r < ROWS; r++) {
    for (let start = 0; start + 2 < COLS; start++) {
      const a = grid[r][start], b = grid[r][start+1], c = grid[r][start+2];
      if (!a.word || !b.word || !c.word) continue;
      if (a.type !== 'verb' || b.type !== 'det' || c.type !== 'noun') continue;
      const key = `${a.word}|${b.word}|${c.word}`;
      if (POOL.lookup[key]) {
        const positions = [[start,r],[start+1,r],[start+2,r]];
        clearIdiomAt(start+1, r, positions, key);
        return;
      }
    }
  }
}

/* ---------- Rendering ----------
 * The main board is redrawn from scratch on every frame (cheap at
 * 22x7 with 50px cells). Each cell is drawn via drawCell(); a
 * separate ghost pass renders the dashed outline of where the
 * active piece will land.
 * ----------------------------- */

/**
 * Draw a single cell on the main board.
 *
 * Visual style: rounded square, color from CSS var based on type,
 * adaptive font size that always fits the cell width. The adaptive
 * loop starts at 55% of cell side and steps down by 1px until the
 * text fits, with a hard minimum of 6px.
 *
 * @param {string} type    - 'verb' | 'det' | 'noun' | 'empty' (no-op)
 * @param {string} word    - word to render in the cell
 * @param {number} x,y     - top-left pixel coord on the main canvas
 * @param {number} size    - cell side length in px
 * @param {number} [alpha=1]  - global alpha
 * @param {boolean} [ghost=false] - if true, draw dashed outline only
 */
function drawCell(type, word, x, y, size, alpha=1, ghost=false) {
  if (type === 'empty') return;
  const colors = {
    verb: getCss('--verb'),
    det:  getCss('--det'),
    noun: getCss('--noun'),
  };
  const shadows = {
    verb: getCss('--verb-shadow'),
    det:  getCss('--det-shadow'),
    noun: getCss('--noun-shadow'),
  };
  ctx.save();
  ctx.globalAlpha = alpha;
  if (ghost) {
    /* Ghost: just an outline, no fill */
    ctx.strokeStyle = colors[type];
    ctx.lineWidth = 2;
    ctx.setLineDash([5, 4]);
    ctx.fillStyle = 'transparent';
  } else {
    /* Filled cell with a slightly darker stroke so cells don't blur together */
    ctx.fillStyle = colors[type];
    ctx.strokeStyle = shadows[type];
    ctx.lineWidth = 2;
    ctx.setLineDash([]);
  }
  /* tetromino block shape (slight rounded) */
  const r = 5;
  const xx = x + 1, yy = y + 1, ss = size - 2;
  ctx.beginPath();
  ctx.moveTo(xx + r, yy);
  ctx.arcTo(xx + ss, yy,     xx + ss, yy + ss, r);
  ctx.arcTo(xx + ss, yy + ss, xx,      yy + ss, r);
  ctx.arcTo(xx,      yy + ss, xx,      yy,      r);
  ctx.arcTo(xx,      yy,      xx + ss, yy,      r);
  ctx.closePath();
  if (!ghost) ctx.fill();
  ctx.stroke();
  ctx.setLineDash([]);
  if (ghost) { ctx.restore(); return; }
  /* Word — adaptive font size that always fits the cell width.
   * Start at 70% of cell size and use a layered text rendering
   * technique for crisp letterforms:
   *   1. Heavy dark stroke (3 layers) — darkens edges, adds weight
   *   2. Bright white inner fill (offset by 1px) — sharpens glyphs
   *      and creates a halo around dark letters
   *   3. Original dark fill on top — the actual word color
   * This is the same trick game UIs use for readable text on any bg. */
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const targetWidth = ss - 5;
  let fontSize = Math.floor(ss * 0.70);  // start large
  const fontStack = '-apple-system, "Helvetica Neue", "Segoe UI", system-ui, sans-serif';
  ctx.font = `800 ${fontSize}px ${fontStack}`;
  while (ctx.measureText(word).width > targetWidth && fontSize > 8) {
    fontSize -= 1;
    ctx.font = `800 ${fontSize}px ${fontStack}`;
  }
  while ((fontSize + 3) > ss && fontSize > 8) {
    fontSize -= 1;
    ctx.font = `800 ${fontSize}px ${fontStack}`;
  }
  const cx = x + size/2;
  const cy = y + size/2;
  /* Layer 1: bright halo (1px) — sharpens white glyphs against any cell color */
  ctx.lineJoin = 'round';
  ctx.miterLimit = 2;
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.55)';
  ctx.lineWidth = Math.max(0.8, fontSize * 0.06);
  ctx.strokeText(word, cx, cy);
  /* Layer 2: heavy dark outline — strong dark edge so the white text
   * pops on the bright cell colors */
  ctx.strokeStyle = 'rgba(8, 10, 18, 0.92)';
  ctx.lineWidth = Math.max(2, fontSize * 0.18);
  ctx.strokeText(word, cx, cy);
  /* Layer 3: solid white fill — the final word color */
  ctx.fillStyle = '#f8fafc';
  ctx.fillText(word, cx, cy);
  ctx.restore();
}

/**
 * Read a CSS custom property from :root. We re-read on every draw
 * (rather than caching) so theme tweaks in DevTools apply live.
 *
 * @param {string} v - CSS variable name, including leading "--"
 * @returns {string} trimmed value
 */
function getCss(v) {
  return getComputedStyle(document.documentElement).getPropertyValue(v).trim();
}

/** Faint vertical + horizontal gridlines between cells. */
function drawGrid() {
  ctx.strokeStyle = getCss('--grid-line');
  ctx.lineWidth = 1;
  for (let i = 1; i < COLS; i++) {
    ctx.beginPath();
    ctx.moveTo(i * CELL, 0);
    ctx.lineTo(i * CELL, ROWS * CELL);
    ctx.stroke();
  }
  for (let j = 1; j < ROWS; j++) {
    ctx.beginPath();
    ctx.moveTo(0, j * CELL);
    ctx.lineTo(COLS * CELL, j * CELL);
    ctx.stroke();
  }
}

/**
 * Full-board repaint. Called every frame from loop().
 * Order matters: background -> gridlines -> locked cells ->
 * ghost preview -> active piece. The ghost is computed by
 * repeatedly trying to step the piece down until it collides.
 */
function draw() {
  ctx.fillStyle = getCss('--grid-bg');
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  drawGrid();
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = grid[r][c];
      if (cell.type !== 'empty') {
        drawCell(cell.type, cell.word, c * CELL, r * CELL, CELL);
      }
    }
  }
  /* ghost — dashed outline at the landing position */
  if (current && !gameOver) {
    let gy = current.y;
    while (!collides({...current, y: gy + 1}, 0, 0)) gy += 1;
    drawCell(current.type, current.word, current.x * CELL, gy * CELL, CELL, 0.9, true);
    /* active solid block at current.y */
    drawCell(current.type, current.word, current.x * CELL, current.y * CELL, CELL);
  }
}

/* ---------- Toast / particles ----------
 * showToast() briefly displays the cleared idiom above the board
 * (idiom + Chinese gloss + English example). spawnParticles()
 * creates a short-lived Web-Animations-API burst at the centroid
 * of the cleared cells, layered on top of the canvas via DOM.
 * ------------------------------------- */

/**
 * Show the cleared idiom's full form + Chinese meaning in the
 * center toast. We restart the CSS animation by toggling the
 * `show` class with a forced reflow in between.
 *
 * @param {{display:string, cn:string, en?:string}} entry - POOL.lookup value
 */
function showToast(entry) {
  const overlay = $('toast');
  $('toast-idiom').textContent = entry.display;
  $('toast-cn').textContent = entry.cn;
  $('toast-en').textContent = entry.en || '';
  overlay.classList.remove('show');
  void overlay.offsetWidth; // restart animation
  overlay.classList.add('show');
}

/**
 * Burst of small DOM particles at (col, row). Uses the Web
 * Animations API (`element.animate`) for a zero-dependency
 * physics-light effect. Each particle is auto-removed on finish.
 *
 * @param {number} col  - grid column (multiplied by CELL)
 * @param {number} row  - grid row    (multiplied by CELL)
 * @param {number} count - number of particles to emit
 */
function spawnParticles(col, row, count) {
  const overlay = document.querySelector('.board-wrap');
  const rect = canvas.getBoundingClientRect();
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const color = ['var(--verb)','var(--det)','var(--noun)'][i % 3];
    p.style.background = color;
    p.style.left = (rect.left + (col + 1) * CELL) + 'px';
    p.style.top = (rect.top + row * CELL) + 'px';
    overlay.appendChild(p);
    const dx = (Math.random() - 0.5) * 220;
    const dy = (Math.random() - 1) * 240;
    const dur = 600 + Math.random() * 600;
    p.animate([
      { transform: 'translate(0,0) scale(1)', opacity: 1 },
      { transform: `translate(${dx}px, ${dy}px) scale(0)`, opacity: 0 }
    ], { duration: dur, easing: 'cubic-bezier(.2,.6,.4,1)' }).onfinish = () => p.remove();
  }
}

/* ---------- Game loop ----------
 * Standard fixed-timestep-feel loop using requestAnimationFrame.
 * `dt` is the wall-clock delta since the previous frame in ms;
 * we accumulate it in `dropTimer` and trigger a single-cell drop
 * whenever the threshold is reached. The visual is redrawn every
 * frame regardless (cheap).
 * ----------------------------- */

/**
 * Per-frame logic step. Advances the falling piece by one row
 * when the accumulated drop interval has elapsed.
 *
 * @param {number} dt - ms since previous frame
 */
function step(dt) {
  if (gameOver || paused) return;
  dropTimer += dt;
  if (dropTimer >= dropInterval) {
    dropTimer = 0;
    if (!collides(current, 0, 1)) {
      current.y += 1;
    } else {
      lock(current);
    }
  }
}

/**
 * Main RAF callback. Computes delta time, runs the step, repaints,
 * updates the status line on game over, and re-arms itself.
 * @param {DOMHighResTimeStamp} t - timestamp passed by the browser
 */
function loop(t) {
  const dt = lastTime ? (t - lastTime) : 16;
  lastTime = t;
  step(dt);
  draw();
  if (gameOver) {
    $('status').innerHTML = '<span class="gameover">GAME OVER</span>';
  }
  requestAnimationFrame(loop);
}

/* ---------- Input ----------
 * Keyboard handler. We swallow the default for Space and ArrowUp
 * so the page doesn't scroll. `P` toggles pause; arrow keys move
 * the active piece; Space / ArrowUp is a hard drop. Soft drop
 * with ArrowDown earns +1 score per cell as a small incentive.
 * --------------------------------- */

/**
 * Global keydown handler. See block comment above for the full
 * keymap. Ignores all input while the game is over; ignores
 * movement input while paused (but still allows un-pausing).
 */
document.addEventListener('keydown', (e) => {
  if (gameOver) return;
  if (e.key === 'p' || e.key === 'P') { paused = !paused; $('status').textContent = paused ? 'paused' : 'playing'; return; }
  if (paused) return;
  if (e.key === 'ArrowLeft') {
    if (!collides(current, -1, 0)) current.x -= 1;
  } else if (e.key === 'ArrowRight') {
    if (!collides(current, 1, 0)) current.x += 1;
  } else if (e.key === 'ArrowDown') {
    if (!collides(current, 0, 1)) {
      current.y += 1;
      score += 1;
      $('stat-score').textContent = score;
    }
  } else if (e.key === 'ArrowUp' || e.key === ' ') {
    e.preventDefault();
    while (!collides(current, 0, 1)) current.y += 1;
    lock(current);
  }
});

/**
 * Reset the game to a fresh state. Safe to call at any time.
 * Called by the Restart button and also from the boot sequence
 * after the idiom pool has loaded.
 */
$('restart').addEventListener('click', restart);

function restart() {
  grid = makeGrid();
  cleared = 0; score = 0; lines = 0; level = 1;
  dropTimer = 0;
  gameOver = false;
  paused = false;
  dropInterval = 800;
  $('stat-cleared').textContent = '0';
  $('stat-score').textContent = '0';
  /* stat-lines is intentionally absent from the redesigned mini
   * side panel — guard the lookup so restart() doesn't crash. */
  if ($('stat-lines')) $('stat-lines').textContent = '0';
  $('status').textContent = 'playing';
  /* stat-lines is intentionally absent from the redesigned mini
   * side panel — guard the lookup so restart() doesn't crash. */
  if ($('stat-lines')) $('stat-lines').textContent = '0';
  next = newPiece();
  spawnNext();
  drawNext();
}

/* ---------- Boot ----------
 * Top-level bootstrap. Load the idiom pool, reset state, paint
 * the first frame, then kick off the RAF loop. Errors are
 * logged but not surfaced to the user (the fallback pool keeps
 * the game playable even on fetch failure).
 * --------------------------------- */
loadPool().then(() => {
  restart();
  // Force a first draw + start the loop
  draw();
  lastTime = performance.now();
  /* Flip the boot flag AFTER restart() so drawNext() can safely
   * read `next` (a `let` binding further down). Until this point
   * drawNext() no-ops (board is being painted by draw() anyway). */
  bootComplete = true;
  drawNext();        // paint the side panel now that `next` exists
  /* initModals() is defined in the second <script> block below.
   * Function declarations are NOT hoisted across separate
   * <script> tags — the second <script> hasn't parsed yet when
   * this callback runs, so `initModals` is still `undefined` here.
   * Wait for `DOMContentLoaded`, which fires after every <script>
   * in the document has been parsed. */
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => {
      if (typeof initModals === 'function') initModals();
    }, { once: true });
  } else {
    /* The DOM is already parsed (e.g. the bottom <script> ran
     * before us via ordering weirdness) — call it now. */
    if (typeof initModals === 'function') initModals();
  }
  requestAnimationFrame(loop);
}).catch(err => {
  console.error('boot failed:', err);
});
</script>

<script>
"use strict";

/* ============================================================
 *  Game-over modal + share + leaderboard
 *  ------------------------------------------------------------
 *  When the game ends, a modal pops up showing the final score
 *  and cleared count, an optional name input for submitting to
 *  the global leaderboard, and a "Share" button that hands a
 *  text+url payload to the OS share sheet (no screenshot).
 *
 *  Leaderboard backend: a Cloudflare Worker + KV (see worker/
 *  in this repo). `WORKER_URL` below should point at the deployed
 *  worker. If it's blank, the leaderboard buttons degrade
 *  gracefully (Submit is disabled, View shows a hint).
 *  ============================================================ */

/* ---------- Config ---------- */
const SHARE_URL  = 'https://shiyangzheng.top/idiom-tetris/';
const WORKER_URL = 'https://idiom-tetris-leaderboard.zhengshiyang97.workers.dev';
const LEADERBOARD_LIMIT = 50;  // top-N shown in the modal
const LEADERBOARD_LOCAL_KEY = 'idiom-tetris:leaderboard-local-mock';
/* When WORKER_URL is empty, the game falls back to a localStorage-only
 * "mock" leaderboard so you can still see the UI work end-to-end during
 * development. Set WORKER_URL to a real worker to publish globally. */

/* ---------- Modal control ----------
 * showModal/hideModal just flip the [hidden] attribute. We also
 * pause/unpause the game so the board freezes while the modal
 * is open. */
let _pausedBeforeModal = false;
function showModal(id) {
  _pausedBeforeModal = paused;
  paused = true;
  $(id).hidden = false;
}
function hideModal(id) {
  $(id).hidden = true;
  paused = _pausedBeforeModal;
}

/* ---------- Boot: wire game-over modal + buttons ---------- */
function initModals() {
  /* Game over → open modal. We hook into the existing status
   * element via a MutationObserver since loop() is the only place
   * that flips it to GAME OVER. */
  const statusEl = $('status');
  let _wasGameOver = false;
  new MutationObserver(() => {
    const isGameOver = statusEl.querySelector('.gameover') !== null;
    if (isGameOver && !_wasGameOver) {
      onGameOver();
    }
    _wasGameOver = isGameOver;
  }).observe(statusEl, { childList: true, subtree: true, characterData: true });

  /* Game-over modal buttons */
  $('btn-submit-lb').addEventListener('click', onSubmitLeaderboard);
  $('btn-share').addEventListener('click', onShare);
  $('btn-skip').addEventListener('click', () => hideModal('gameover-modal'));

  /* Side-panel "Leaderboard" button: opens the leaderboard modal
   * at any time (you don't have to die first). */
  $('btn-view-lb').addEventListener('click', () => showLeaderboard());

  /* Leaderboard modal: Enter on the name field submits. */
  $('lb-name').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); onSubmitLeaderboard(); }
  });
  $('btn-lb-close').addEventListener('click', () => hideModal('leaderboard-modal'));

  /* If WORKER_URL is empty, the Submit button is disabled and we
   * tell the user once. */
  if (!WORKER_URL) {
    $('btn-submit-lb').disabled = true;
    $('btn-submit-lb').title = 'Leaderboard backend not configured (WORKER_URL is empty)';
  }
}

/* ---------- Game over hook ----------
 * Populate the final-stats display, prefill the name input from
 * localStorage, and show the modal. */
function onGameOver() {
  $('final-score').textContent   = score.toLocaleString();
  $('final-cleared').textContent = cleared;
  $('share-status').textContent  = '';
  $('share-status').className    = 'share-status';
  /* Pre-fill the name field with the last name the user submitted
   * under, so most players only have to click Submit, not retype. */
  const lastName = (() => { try { return localStorage.getItem('idiom-tetris:last-name') || ''; } catch { return ''; } })();
  $('lb-name').value = lastName;
  showModal('gameover-modal');
}

/* ---------- Share ----------
 * Hand a text+url payload to the OS share sheet via
 * navigator.share(). The system share sheet on iOS / macOS /
 * Android automatically lists every installed app that accepts
 * the share extension — WeChat, X (Twitter), Instagram, LinkedIn,
 * Messages, Mail, etc. — so we don't need to wire up each
 * platform individually.
 *
 * We no longer render a screenshot. The text is the share: it
 * states the player's score and cleared count, and invites the
 * recipient to try the game via the link. (See worker/ in this
 * repo for the optional leaderboard side of the story.)
 *
 * Fallbacks:
 *   1. navigator.share     — text+url via the system share sheet
 *   2. copy-to-clipboard   — older desktop browsers without any
 *                            share-sheet support
 */
async function onShare() {
  const status = $('share-status');
  const btn    = $('btn-share');
  if (btn.disabled) return;
  btn.disabled = true;
  status.textContent = 'Opening share sheet…';
  status.className   = 'share-status';

  /* Share text — link only (no screenshot, per request). Personal score
   * is the hook; the URL does the rest. Optimized for one line on
   * Twitter / LinkedIn (counted characters) but also reads naturally
   * as a WhatsApp / WeChat message. */
  const shareText =
    `I scored ${score.toLocaleString()} in Idiom Tetris ` +
    `(${cleared} idioms cleared) — think you can beat me?\n` +
    `Play free: ${SHARE_URL}`;
  const shareTitle = 'Idiom Tetris';

  try {
    if (navigator.share) {
      try {
        await navigator.share({ title: shareTitle, text: shareText, url: SHARE_URL });
        status.textContent = 'Shared!';
        status.className   = 'share-status ok';
      } catch (e) {
        /* OS share sheet dismissable → user-cancel is not an error. */
        if (e && (e.name === 'AbortError' || /cancel/i.test(e.message || ''))) {
          status.textContent = 'Share canceled.';
          status.className   = 'share-status';
        } else {
          throw e;
        }
      }
    } else {
      /* No share-sheet support: copy text to clipboard. */
      await copyToClipboard(shareText);
      status.textContent = 'Copied to clipboard! Paste it into WeChat / X / LinkedIn…';
      status.className   = 'share-status ok';
    }
  } catch (e) {
    status.textContent = 'Share failed: ' + (e && e.message ? e.message : e);
    status.className   = 'share-status err';
  } finally {
    btn.disabled = false;
  }
}

async function copyToClipboard(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    await navigator.clipboard.writeText(text);
    return;
  }
  /* Old-browser fallback: hidden textarea + execCommand. */
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.setAttribute('readonly', '');
  ta.style.position = 'absolute';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); } finally { ta.remove(); }
}

/* ---------- Leaderboard ----------
 * Three flows:
 *   1. Submit (game-over modal): POST {name, score, cleared} to
 *      WORKER_URL. Server returns {rank, total} → we show the
 *      rank in the status line and (optionally) open the modal.
 *   2. View (side panel or post-submit): GET /leaderboard, render
 *      top 50. Falls back to a localStorage "mock" if WORKER_URL
 *      is empty or the request fails (offline / blocked).
 *   3. Empty/no-backend state: clear status text + empty <ol>.
 *
 * Validation runs in two places: the worker (authoritative) AND
 * the client (to avoid a wasted round trip on a clearly bad
 * input). They share the same regex; if they drift the worker
 * rejects with 400 and the client shows the error.
 */
const LB_NAME_RE = /^[\p{L}\p{N}_\- \p{Extended_Pictographic}]{1,12}$/u;

async function onSubmitLeaderboard() {
  const status = $('share-status');    /* re-use the slot under the buttons */
  const btn    = $('btn-submit-lb');
  if (btn.disabled) return;
  const raw = ($('lb-name').value || '').trim();
  if (!LB_NAME_RE.test(raw)) {
    status.textContent = 'Name must be 1-12 letters / digits / space / _ / - / emoji.';
    status.className   = 'share-status err';
    return;
  }
  if (!WORKER_URL) {
    status.textContent = 'Leaderboard backend not configured (WORKER_URL is empty).';
    status.className   = 'share-status err';
    return;
  }
  btn.disabled = true;
  status.textContent = 'Submitting…';
  status.className   = 'share-status';
  try {
    const r = await fetchWithTimeout(`${WORKER_URL.replace(/\/+$/, '')}/submit`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ name: raw, score, cleared }),
    }, 8000);
    if (!r.ok) {
      const errBody = await safeJson(r);
      throw new Error(errBody && errBody.error || `HTTP ${r.status}`);
    }
    const { rank, total } = await r.json();
    /* Persist the name so the next game pre-fills the input. */
    try { localStorage.setItem('idiom-tetris:last-name', raw); } catch {}
    status.textContent = `🎉 You're rank #${rank} of ${total}! Click "🏆 Leaderboard" to see.`;
    status.className   = 'share-status ok';
  } catch (e) {
    status.textContent = 'Submit failed: ' + (e && e.message ? e.message : e);
    status.className   = 'share-status err';
  } finally {
    btn.disabled = false;
  }
}

async function showLeaderboard() {
  const statusEl = $('lb-status');
  const listEl   = $('lb-list');
  statusEl.textContent = 'Loading…';
  statusEl.className   = 'share-status';
  listEl.innerHTML     = '';
  showModal('leaderboard-modal');

  let entries = [];
  let source  = '';   // 'remote' | 'local' | ''
  if (WORKER_URL) {
    try {
      const r = await fetchWithTimeout(`${WORKER_URL.replace(/\/+$/, '')}/leaderboard`, {}, 8000);
      if (r.ok) {
        const j = await r.json();
        entries = (j && Array.isArray(j.entries)) ? j.entries : [];
        source  = 'remote';
      } else {
        throw new Error(`HTTP ${r.status}`);
      }
    } catch (e) {
      /* Fall through to the local mock. */
      const local = readLocalMock();
      entries = local;
      source  = 'local';
      statusEl.textContent = `Couldn't reach leaderboard (${e.message || e}). Showing your local scores.`;
      statusEl.className   = 'share-status err';
    }
  } else {
    entries = readLocalMock();
    source  = 'local';
    statusEl.textContent = 'Leaderboard backend not configured — showing your local scores.';
    statusEl.className   = 'share-status';
  }

  renderLeaderboard(entries, /*highlightName=*/readLastName());

  if (source === 'remote' && entries.length === 0) {
    statusEl.textContent = 'No scores yet — be the first!';
    statusEl.className   = 'share-status';
  } else if (source === 'remote') {
    statusEl.textContent = `Top ${entries.length} of ${entries.length}+ players`;
    statusEl.className   = 'share-status';
  }
  /* Persist the latest remote snapshot to local storage as a
   * "best known" backup; on the next submit we'll also update it
   * so a freshly-submitted row is visible in the local mock. */
  if (source === 'remote') writeLocalMock(entries);
}

function renderLeaderboard(entries, highlightName) {
  const listEl = $('lb-list');
  listEl.innerHTML = '';
  if (!entries || entries.length === 0) {
    const li = document.createElement('li');
    li.className = 'lb-empty';
    li.textContent = 'No scores yet. Play a game and submit to claim the first spot!';
    listEl.appendChild(li);
    return;
  }
  const frag = document.createDocumentFragment();
  for (const e of entries) {
    const li = document.createElement('li');
    if (highlightName && e.name === highlightName) li.classList.add('lb-mine');
    const rank = document.createElement('span');
    rank.className = 'lb-rank';
    rank.textContent = e.rank;
    if (e.rank === 1) rank.textContent = '🥇 ' + e.rank;
    else if (e.rank === 2) rank.textContent = '🥈 ' + e.rank;
    else if (e.rank === 3) rank.textContent = '🥉 ' + e.rank;
    const name = document.createElement('span');
    name.className = 'lb-name';
    name.textContent = e.name;  /* safe: set as text, not innerHTML */
    const score = document.createElement('span');
    score.className = 'lb-score';
    score.textContent = e.score.toLocaleString();
    const cleared = document.createElement('span');
    cleared.className = 'lb-cleared';
    cleared.textContent = `${e.cleared} clr`;
    li.append(rank, name, score, cleared);
    frag.appendChild(li);
  }
  listEl.appendChild(frag);
}

/* ---------- Local-storage mock (used when WORKER_URL is empty
 *  or the remote is unreachable) ---------- */
function readLocalMock() {
  try {
    const raw = localStorage.getItem(LEADERBOARD_LOCAL_KEY);
    if (!raw) return [];
    const arr = JSON.parse(raw);
    if (!Array.isArray(arr)) return [];
    return arr
      .sort((a, b) => b.score - a.score || a.ts - b.ts)
      .slice(0, LEADERBOARD_LIMIT)
      .map((e, i) => ({ rank: i + 1, name: e.name, score: e.score, cleared: e.cleared, when: e.ts }));
  } catch { return []; }
}
function writeLocalMock(entries) {
  try {
    /* Strip the rank field the server adds — recompute on read. */
    const slim = entries.map(({ rank, ...rest }) => rest);
    localStorage.setItem(LEADERBOARD_LOCAL_KEY, JSON.stringify(slim));
  } catch {}
}
function readLastName() {
  try { return localStorage.getItem('idiom-tetris:last-name') || ''; } catch { return ''; }
}

/* ---------- Network helpers ---------- */
async function fetchWithTimeout(url, opts, ms) {
  const ctl = new AbortController();
  const t = setTimeout(() => ctl.abort(), ms);
  try {
    return await fetch(url, { ...opts, signal: ctl.signal });
  } finally {
    clearTimeout(t);
  }
}
async function safeJson(r) { try { return await r.json(); } catch { return null; } }
</script>
</body>
